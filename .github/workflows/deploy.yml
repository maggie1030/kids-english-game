name: Deploy to HK Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 创建 index.html（将主文件复制为入口）
    - name: Prepare index.html
      run: |
        cp 英语游戏中心.html index.html

    # 安装 sshpass（用于密码登录）
    - name: Install sshpass
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass

    # 部署到服务器（使用密码）
    - name: Deploy to Server
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        echo "🚀 开始部署到香港服务器..."
        DEPLOY_PATH="/var/www/kids-game"

        # 创建目标目录
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "mkdir -p $DEPLOY_PATH"

        # 删除旧文件（安全路径）
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "rm -rf $DEPLOY_PATH/*" || true

        # 上传新文件
        sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -r ./* $SSH_USER@$SSH_HOST:$DEPLOY_PATH/

        echo "✅ 文件部署完成"

    # 设置文件权限
    - name: Set Permissions
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        DEPLOY_PATH="/var/www/kids-game"
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "chmod -R 755 $DEPLOY_PATH"

    # 清理临时文件
    - name: Cleanup
      run: |
        rm -f index.html

    # 部署成功通知
    - name: Deploy Success
      run: |
        echo "🎉 部署成功！"
        echo "服务器: ${{ secrets.SSH_HOST }}"
        echo "目录: ${{ secrets.DEPLOY_PATH }}"
        echo ""
        echo "📁 目录结构（与其他网站隔离）:"
        echo "   /var/www/"
        echo "   ├── website1/     ← 现有网站1（未改动）"
        echo "   ├── website2/     ← 现有网站2（未改动）"
        echo "   └── kids-game/    ← 新游戏（独立）"
