name: Deploy to HK Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 创建 index.html（将主文件复制为入口）
    - name: Prepare index.html
      run: |
        cp 英语游戏中心.html index.html

    # 设置 SSH 密钥
    - name: Setup SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: unnecessary
        config: |
          Host server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            Port ${{ secrets.SERVER_PORT || '22' }}
            StrictHostKeyChecking no

    # 创建远程目录并部署
    - name: Deploy to Server
      run: |
        echo "🚀 开始部署到香港服务器..."

        # 创建目标目录（如果不存在）
        ssh server "mkdir -p ${{ secrets.DEPLOY_PATH }}"

        # 删除旧文件
        ssh server "rm -rf ${{ secrets.DEPLOY_PATH }}/*"

        # 上传新文件
        scp -r ./* server:${{ secrets.DEPLOY_PATH }}/

        echo "✅ 文件部署完成"

    # 设置文件权限
    - name: Set Permissions
      run: |
        ssh server "chmod -R 755 ${{ secrets.DEPLOY_PATH }}"

    # 清理临时文件
    - name: Cleanup
      run: |
        rm -f index.html

    # 部署成功通知
    - name: Deploy Success
      run: |
        echo "🎉 部署成功！"
        echo "服务器: ${{ secrets.SSH_HOST }}"
        echo "目录: ${{ secrets.DEPLOY_PATH }}"
        echo ""
        echo "📁 目录结构（与其他网站隔离）:"
        echo "   /var/www/"
        echo "   ├── website1/     ← 现有网站1（未改动）"
        echo "   ├── website2/     ← 现有网站2（未改动）"
        echo "   └── ${{ secrets.DEPLOY_PATH }}/  ← 新游戏（独立）"
